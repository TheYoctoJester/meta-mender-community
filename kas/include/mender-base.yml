header:
  version: 11

distro: ""

repos:
  openembedded-core:
    url: http://git.openembedded.org/openembedded-core
    refspec: scarthgap
    layers:
      meta:

  # the 2.8 corresponds to scarthgap
  bitbake:
    url: http://git.openembedded.org/bitbake
    refspec: "2.8"
    path: "openembedded-core/bitbake"
    layers:
      bitbake: excluded

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    refspec: scarthgap
    layers:
      meta-oe:

  meta-mender:
    url: https://github.com/theyoctojester/meta-mender.git
    refspec: scarthgap
    layers:
      meta-mender-core:

local_conf_header:
  base: |
    CONF_VERSION = "2"
    PACKAGE_CLASSES = "package_ipk"
    INIT_MANAGER = "systemd"
  
  mender-artifact: |
    MENDER_ARTIFACT_NAME = "gha_autobuild"

target:
  - core-image-minimal
