header:
  version: 11

distro: "poky"

repos:
  poky:
    url: http://git.yoctoproject.org/poky
    refspec: e139e9d0ce343ba77a09601a976c92acd562c9df
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    refspec: 0560b848996a0feb410a8cd8ca07c60fe2f3b5bc
    layers:
      meta-oe:

  meta-mender:
    url: https://github.com/mendersoftware/meta-mender.git
    refspec: 0990aae974f0bb2f59dba1c323111732a6234707
    layers:
      meta-mender-core:

local_conf_header:
  base: |
    CONF_VERSION = "2"
    PACKAGE_CLASSES = "package_ipk"
    INIT_MANAGER = "systemd"
    INHERIT += "rm_work"
  
  mender-artifact: |
    MENDER_ARTIFACT_NAME = "gha_autobuild"

target:
  - core-image-minimal
